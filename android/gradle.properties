# -Xmx lowered from the Flutter template's default 8G: this machine only has
# 7G of physical RAM total, so an 8G heap request reliably OOM-crashes the
# Gradle daemon (native mmap failure) once the emulator/backend/IDE are also
# running. 1536m leaves headroom for everything else sharing the box.
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Disabled: the Kotlin incremental compiler crashes ("this and base files
# have different roots") when the project and the Gradle/pub caches live on
# different Windows drive letters (project on D:, caches on C:). Kills the
# Gradle daemon mid-build otherwise. See KT-66740-style cross-drive bug.
kotlin.incremental=false
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
